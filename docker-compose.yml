services:
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - gateway

  gateway:
    build: ./services/gateway
    ports:
      - "8000:8000"
    environment:
      - AUTH_SERVICE_URL=http://auth:8001
      - BILLING_SERVICE_URL=http://billing:8002
      - ANALYTICS_SERVICE_URL=http://analytics:8003
    depends_on:
      - auth
      - billing
      - analytics

  auth:
    build: ./services/auth
    ports:
      - "8001:8001"
    env_file:
      - ./services/auth/.env

  billing:
    build: ./services/billing
    ports:
      - "8002:8002"
    env_file:
      - ./services/billing/.env

  analytics:
    build: ./services/analytics
    ports:
      - "8003:8003"
    env_file:
      - ./services/analytics/.env
